name: board_game_app
description: "Board stats game app"
publish_to: "none"
version: 0.1.1

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  drift_flutter: ^0.2.8
  drift: ^2.30.0
  intl: ^0.20.2
  flutter_bloc: ^9.1.1
  get_it: ^9.2.0
  package_info_plus: ^9.0.0
  path_provider: ^2.1.5
  shared_preferences: ^2.5.3
  flutter_popup: ^3.3.9
  flutter_colorpicker: ^1.1.0
  flutter_slidable: ^4.0.3
  flutter_dotenv: ^6.0.0
  url_launcher: ^6.3.2
  flutter_launcher_icons: ^0.14.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  drift_dev: ^2.28.1
  build_runner: ^2.7.0

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/images/
    - .env
